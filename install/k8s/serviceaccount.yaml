apiVersion: v1
kind: ServiceAccount
metadata:
  name: one-marketplace
  namespace: cozy-files
---
# Long-lived token used by the OpenNebula frontend to authenticate to the
# Kubernetes API when talking to the Files API. After creation, copy the
# secret's "token" value to the ONE frontend at:
#   /var/lib/one/.cozyportal/token
# and the CA at:
#   /var/lib/one/.cozyportal/ca.crt  (from the secret's "ca.crt" field)
apiVersion: v1
kind: Secret
metadata:
  name: one-marketplace-token
  namespace: cozy-files
  annotations:
    kubernetes.io/service-account.name: one-marketplace
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyportal:one-marketplace
rules:
  # The Files API server validates the caller's rights against files/upload
  # and files/content subresources. We also need get/list/delete on the
  # parent "files" resource so the driver can read metadata and dispose of
  # the object when a MarketPlaceApp is deleted.
  - apiGroups: ["files.portal.cozystack.io"]
    resources: ["files"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["files.portal.cozystack.io"]
    resources: ["files/upload", "files/content"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyportal:one-marketplace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyportal:one-marketplace
subjects:
  - kind: ServiceAccount
    name: one-marketplace
    namespace: cozy-files
