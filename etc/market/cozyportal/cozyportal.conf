# -------------------------------------------------------------------------- #
# Cozyportal Marketplace Driver — configuration file                         #
#                                                                            #
# Installed at /var/lib/one/remotes/etc/market/cozyportal/cozyportal.conf                    #
# Sourced by import/delete/downloader scripts on the OpenNebula frontend.    #
# -------------------------------------------------------------------------- #

# Kubernetes API endpoint to reach the aggregated Files API.
# Must be reachable from the OpenNebula frontend.
COZYPORTAL_API="https://kubernetes.default.svc"

# File containing the ServiceAccount bearer token. The file must be readable
# by the oneadmin user only.
COZYPORTAL_TOKEN_FILE="/var/lib/one/.cozyportal/token"

# CA bundle for the Kubernetes API server. Leave unset to rely on system CAs.
# COZYPORTAL_CACERT="/var/lib/one/.cozyportal/ca.crt"

# Set to "yes" to skip TLS verification (testing only).
COZYPORTAL_INSECURE="no"

# Optional overrides.
# COZYPORTAL_GROUP="files.portal.cozystack.io"
# COZYPORTAL_VERSION="v1alpha1"

# Timeouts (seconds).
COZYPORTAL_CONNECT_TIMEOUT=30
COZYPORTAL_REQUEST_TIMEOUT=120
COZYPORTAL_UPLOAD_TIMEOUT=7200
COZYPORTAL_DOWNLOAD_TIMEOUT=7200

# Synthetic marketplace capacity (MB) reported to oned monitor. Storage is
# ultimately bounded by the Cozyportal S3 bucket, not by OpenNebula.
COZYPORTAL_TOTAL_MB=1048576
COZYPORTAL_USED_MB=0
